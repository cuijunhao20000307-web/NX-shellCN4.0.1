name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          apt-get update
          apt-get install -y git make pkg-config zip python3
          dkp-pacman -Syu --noconfirm || true
          dkp-pacman -S --noconfirm switch-dev switch-freetype switch-libpng switch-zlib switch-glad switch-mesa --needed || true

      - name: Fix freetype-config
        run: |
          printf '%s\n' '#!/bin/sh' 'case "$1" in' '  --cflags)' '    echo "-I/opt/devkitpro/portlibs/switch/include/freetype2 -I/opt/devkitpro/portlibs/switch/include"' '    ;;' '  --libs)' '    echo "-L/opt/devkitpro/portlibs/switch/lib -lfreetype"' '    ;;' '  *)' '    echo ""' '    ;;' 'esac' > /usr/local/bin/freetype-config
          chmod +x /usr/local/bin/freetype-config
          /usr/local/bin/freetype-config --cflags
          /usr/local/bin/freetype-config --libs

      - name: Fix imgui dependency
        run: |
          mkdir -p libs
          rm -rf libs/imgui
          git clone --depth 1 --branch v1.89.9 https://github.com/ocornut/imgui.git libs/imgui
          mkdir -p libes
          rm -rf libes/imgui
          cp -r libs/imgui libes/imgui

      - name: Patch source compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('source/gui.cpp')
          s = p.read_text()
          s = s.replace('ImGuiCol_TabSelected', 'ImGuiCol_TabActive')
          p.write_text(s)

          p = Path('source/image.cpp')
          s = p.read_text()
          s = s.replace('#include <string>\n', '#define IMGUI_DEFINE_MATH_OPERATORS\n#include <string>\n', 1)
          s = s.replace('#define IMGUI_DEFINE_MATH_OPERATORS\n#include "imgui_internal.h"', '#include "imgui_internal.h"')
          s = s.replace('ImGuiKey_GamepadDpadDown', 'ImGuiKey_DownArrow')
          s = s.replace('ImGuiKey_GamepadDpadUp', 'ImGuiKey_UpArrow')
          p.write_text(s)
          PY

      - name: Build
        run: |
          make -j2

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: NX-Shell
          path: |
            *.nro
            **/*.nro

name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          apt-get update
          apt-get install -y git make pkg-config zip
          dkp-pacman -Syu --noconfirm || true
          dkp-pacman -S --noconfirm switch-dev switch-freetype switch-libpng switch-zlib switch-glad switch-mesa --needed || true

      - name: Fix freetype-config
        run: |
          cat > /usr/local/bin/freetype-config <<'EOF'
          #!/bin/sh
          case "$1" in
            --cflags)
              echo "-I/opt/devkitpro/portlibs/switch/include/freetype2 -I/opt/devkitpro/portlibs/switch/include"
              ;;
            --libs)
              echo "-L/opt/devkitpro/portlibs/switch/lib -lfreetype"
              ;;
            *)
              echo ""
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/freetype-config
          which freetype-config
          freetype-config --cflags
          freetype-config --libs

      - name: Fix imgui dependency
        run: |
          mkdir -p libs
          rm -rf libs/imgui
          git clone --depth 1 https://github.com/ocornut/imgui.git libs/imgui
          mkdir -p libes
          rm -rf libes/imgui
          cp -r libs/imgui libes/imgui

      - name: Build
        run: |
          make -j2

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: NX-Shell
          path: |
            *.nro
            **/*.nro

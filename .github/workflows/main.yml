name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: NX-Shell
          path: |
            *.nro
            **/*.nro

name: Build Noto Memory Font NRO

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate embedded font sources
        run: |
          test -s res/NotoSansCJKsc-Regular.otf
          test -f source/noto_sans_cjk_sc.s
          grep -q nx_shell_chinese_font_otf source/noto_sans_cjk_sc.s
          grep -q AddFontFromMemoryTTF source/gui.cpp

      - name: Install toolchain packages
        run: |
          apt-get update
          apt-get install -y git make python3 curl
          dkp-pacman -Syu --noconfirm || true
          for p in switch-dev switch-freetype switch-harfbuzz switch-bzip2 switch-libpng switch-zlib switch-glad switch-mesa switch-libjpeg-turbo switch-libwebp switch-giflib; do dkp-pacman -S --noconfirm "$p" --needed || true; done
          printf '%s\n' '#!/bin/sh' 'case "$1" in' '  --cflags) echo "-I/opt/devkitpro/portlibs/switch/include/freetype2 -I/opt/devkitpro/portlibs/switch/include" ;;' '  --libs) echo "-L/opt/devkitpro/portlibs/switch/lib -Wl,--start-group -lfreetype -lharfbuzz -lbz2 -Wl,--end-group" ;;' 'esac' > /usr/local/bin/freetype-config
          chmod +x /usr/local/bin/freetype-config

      - name: Restore build dependencies
        run: |
          rm -rf libs/imgui libes/imgui
          git clone --depth 1 --branch v1.89.9 https://github.com/ocornut/imgui.git libs/imgui
          mkdir -p libes
          cp -r libs/imgui libes/imgui
          rm -rf /tmp/nx-shell libs/libnsbmp libs/include
          git clone --depth 1 https://github.com/joel16/NX-Shell.git /tmp/nx-shell
          mkdir -p libs/libnsbmp/utils libs/include
          cp /tmp/nx-shell/libs/libnsbmp/libnsbmp.c libs/libnsbmp/libnsbmp.c
          cp /tmp/nx-shell/libs/libnsbmp/libnsbmp.h libs/libnsbmp/libnsbmp.h
          cp /tmp/nx-shell/libs/libnsbmp/utils/log.h libs/libnsbmp/utils/log.h
          cp /tmp/nx-shell/libs/libnsbmp/libnsbmp.h libs/include/libnsbmp.h
          rm -rf /tmp/libusbhsfs
          git clone --depth 1 --branch v0.2.7 https://github.com/DarkMatterCore/libusbhsfs.git /tmp/libusbhsfs
          sed -i 's/-Werror /-Werror -Wno-error=unused-but-set-variable /' /tmp/libusbhsfs/Makefile
          make -C /tmp/libusbhsfs BUILD_TYPE=ISC release
          mkdir -p libs/lib
          cp /tmp/libusbhsfs/lib/libusbhsfs.a libs/lib/libusbhsfs.a
          cp /tmp/libusbhsfs/include/usbhsfs.h libs/usbhsfs.h
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o libs/stb_image.h

      - name: Use compact Chinese UI font atlas
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('source/gui.cpp')
          s = p.read_text(errors='ignore')
          old = '''        ImFont* bundled_chinese_font = io.Fonts->AddFontFromMemoryTTF(
            const_cast<unsigned char *>(nx_shell_chinese_font_otf),
            static_cast<int>(nx_shell_chinese_font_otf_end - nx_shell_chinese_font_otf),
            20.f,
            std::addressof(font_cfg),
            io.Fonts->GetGlyphRangesChineseFull()
        );

        if (!bundled_chinese_font) {
            Log::Error("Could not load embedded NotoSansCJKsc-Regular font.");
            return false;
        }

        u8 *px = nullptr;
        int w = 0, h = 0, bpp = 0;
        io.Fonts->GetTexDataAsAlpha8(std::addressof(px), std::addressof(w), std::addressof(h), std::addressof(bpp));
        io.Fonts->Flags |= ImFontAtlasFlags_NoPowerOfTwoHeight;
        io.Fonts->Build();'''
          new = '''        ImFontGlyphRangesBuilder glyph_builder;
        glyph_builder.AddRanges(io.Fonts->GetGlyphRangesDefault());
        glyph_builder.AddText(
            "确定取消选项全选属性重命名新建文件夹新建文件复制移动粘贴删除设置归档位"
            "输入名称文件名称正在复制大小创建时间修改时间访问时间宽度高度"
            "此操作无法撤销要删除以下项目解压压缩包可能需要一些时间正在解压"
            "设置排序语言卸载设备图片查看器开发者多字符集关闭可提升启动速度关于检查更新"
            "显示启用日志特殊符号字符支持版本作者横幅无法连接网络可用下载安装成功请退出并重新运行"
        );
        ImVector<ImWchar> glyph_ranges;
        glyph_builder.BuildRanges(&glyph_ranges);
        font_cfg.OversampleH = 1;
        font_cfg.OversampleV = 1;
        font_cfg.PixelSnapH = true;

        ImFont* bundled_chinese_font = io.Fonts->AddFontFromMemoryTTF(
            const_cast<unsigned char *>(nx_shell_chinese_font_otf),
            static_cast<int>(nx_shell_chinese_font_otf_end - nx_shell_chinese_font_otf),
            20.f,
            std::addressof(font_cfg),
            glyph_ranges.Data
        );

        if (!bundled_chinese_font) {
            Log::Error("Could not load embedded NotoSansCJKsc-Regular font.");
            return false;
        }

        io.Fonts->Flags |= ImFontAtlasFlags_NoPowerOfTwoHeight;
        if (!io.Fonts->Build()) {
            Log::Error("Could not build compact Chinese font atlas.");
            return false;
        }

        u8 *px = nullptr;
        int w = 0, h = 0, bpp = 0;
        io.Fonts->GetTexDataAsAlpha8(std::addressof(px), std::addressof(w), std::addressof(h), std::addressof(bpp));'''
          if old not in s:
              raise SystemExit('Expected embedded font block not found')
          p.write_text(s.replace(old, new))
          PY

      - name: Apply compiler compatibility fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('source/image.cpp')
          if p.exists():
              s = p.read_text(errors='ignore')
              if 'IMGUI_DEFINE_MATH_OPERATORS' not in s.splitlines()[:5]:
                  s = '#define IMGUI_DEFINE_MATH_OPERATORS\n' + s
              s = s.replace('#define IMGUI_DEFINE_MATH_OPERATORS\n#include "imgui_internal.h"', '#include "imgui_internal.h"')
              s = s.replace('ImGuiKey_GamepadDpadDown', 'ImGuiKey_DownArrow')
              s = s.replace('ImGuiKey_GamepadDpadUp', 'ImGuiKey_UpArrow')
              p.write_text(s)
          p = Path('source/tabs/settings.cpp')
          if p.exists():
              s = p.read_text(errors='ignore')
              if 'IMGUI_DEFINE_MATH_OPERATORS' not in s.splitlines()[:5]:
                  p.write_text('#define IMGUI_DEFINE_MATH_OPERATORS\n' + s)
          p = Path('source/popups/properties.cpp')
          if p.exists():
              s = p.read_text(errors='ignore')
              if '#include <ctime>' not in s:
                  p.write_text(s.replace('#include "utils.hpp"', '#include "utils.hpp"\n#include <ctime>'))
          p = Path('source/textures.cpp')
          if p.exists():
              s = p.read_text(errors='ignore')
              s = re.sub(r'bmp_bitmap_callback_vt\s+bitmap_callbacks\s*=\s*\{[^\}]*\};', 'bmp_bitmap_callback_vt bitmap_callbacks = {\n            BMP::bitmap_create,\n            BMP::bitmap_destroy,\n            BMP::bitmap_get_buffer\n        };', s, count=1, flags=re.S)
              p.write_text(s)
          PY

      - name: Compile NRO
        run: |
          make clean
          make -j2
          test -f NX-Shell.nro

      - name: Upload compact-atlas artifact
        uses: actions/upload-artifact@v4
        with:
          name: NX-Shell_CN_NotoCompactAtlas
          path: NX-Shell.nro
